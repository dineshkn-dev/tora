name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: Swift
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        timeout-minutes: 2
      - name: Show toolchain
        timeout-minutes: 1
        run: swift --version
      - name: Test fail-closed build
        timeout-minutes: 8
        run: swift test
