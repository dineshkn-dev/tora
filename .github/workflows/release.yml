name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        timeout-minutes: 2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install libtorrent
        timeout-minutes: 8
        run: |
          export MACOSX_DEPLOYMENT_TARGET=14.0
          HOMEBREW_NO_AUTO_UPDATE=1 brew install --build-from-source libtorrent-rasterbar
      - name: Package app
        timeout-minutes: 12
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          MACOSX_DEPLOYMENT_TARGET=14.0 TORA_LIBTORRENT_PREFIX="$(brew --prefix libtorrent-rasterbar)" Scripts/package-app.sh "$tag"
      - name: Create GitHub Release
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          notes_file=".github/release-notes/${tag}.md"
          notes_arg=(--generate-notes)
          if [[ -f "$notes_file" ]]; then
            notes_arg=(--notes-file "$notes_file")
          fi
          gh release create "$tag" \
            --title "Tora ${tag}" \
            "${notes_arg[@]}" \
            "dist/Tora-${tag}-macos.zip" \
            "dist/Tora-${tag}-macos.zip.sha256" \
            "dist/Tora-${tag}-macos.dmg" \
            "dist/Tora-${tag}-macos.dmg.sha256"
