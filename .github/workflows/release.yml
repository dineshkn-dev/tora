name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        timeout-minutes: 2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install libtorrent
        timeout-minutes: 15
        run: TORA_MINIMUM_MACOS=14.0 Scripts/bootstrap-release-deps.sh
      - name: Package app
        timeout-minutes: 12
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          MACOSX_DEPLOYMENT_TARGET=14.0 TORA_LIBTORRENT_PREFIX="$(brew --prefix libtorrent-rasterbar)" Scripts/package-app.sh "$tag"
      - name: Generate Sparkle appcast
        timeout-minutes: 3
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "SPARKLE_PRIVATE_KEY secret is required to sign appcast.xml." >&2
            exit 1
          fi
          appcast_dir="dist/appcast"
          mkdir -p "$appcast_dir"
          cp "dist/Tora-${tag}-macos.dmg" "$appcast_dir/"
          notes_file=".github/release-notes/${tag}.md"
          if [[ -f "$notes_file" ]]; then
            cp "$notes_file" "$appcast_dir/Tora-${tag}-macos.md"
          fi
          echo "$SPARKLE_PRIVATE_KEY" | \
            .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
              --ed-key-file - \
              --download-url-prefix "https://github.com/dineshkn-dev/tora/releases/download/${tag}/" \
              --embed-release-notes \
              "$appcast_dir"
          cp "$appcast_dir/appcast.xml" "dist/appcast.xml"
      - name: Create GitHub Release
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          notes_file=".github/release-notes/${tag}.md"
          notes_arg=(--generate-notes)
          if [[ -f "$notes_file" ]]; then
            notes_arg=(--notes-file "$notes_file")
          fi
          gh release create "$tag" \
            --title "Tora ${tag}" \
            "${notes_arg[@]}" \
            "dist/appcast.xml" \
            "dist/Tora-${tag}-macos.zip" \
            "dist/Tora-${tag}-macos.zip.sha256" \
            "dist/Tora-${tag}-macos.dmg" \
            "dist/Tora-${tag}-macos.dmg.sha256"
